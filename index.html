<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arto</title>
  <link rel="stylesheet" href="mainstyle.css?v=2" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22white%22>Ω</text></svg>"
    type="image/svg+xml">
</head>
<body>
  <!-- Retro Filter Overlay -->
  <div id="crt-overlay" style="display: none; pointer-events: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9990;">
    <div class="crt-scanlines"></div>
    <div class="dither-overlay" id="dither-overlay"></div>
    <div class="crt-noise" id="crt-noise"></div>
  </div>

  <!-- User Account (Top Right) -->
  <div id="user-auth-section" class="user-auth-section top-right">
    <button id="login-btn" class="login-btn guest" title="Login / Guest Mode">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </button>
    <div id="user-info" class="user-info hidden">
      <img id="user-photo" src="" alt="user">
      <div id="logout-panel" class="logout-panel">
        <button id="logout-btn" class="logout-btn" title="Logout">✕</button>
      </div>
    </div>
  </div>

  <!-- Fade-in overlay -->
  <div id="page-fade-overlay"></div>

  <div class="backgroundhover"></div>

  <video id="backgroundVideo" loop muted autoplay playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>

  <div id="imageOverlay" class="image-overlay"></div>

  <div id="draggable-clock" class="draggable-clock">
    <span id="clock-icon"></span>
    <span id="clock-time">00:00:00</span>
    <span id="clock-retro-dot" class="retro-dot">.</span>
    <span id="clock-ampm" style="font-size: 0.5em;"></span>
  </div>

  <!-- Navigation -->
  <div class="content">
    <nav class="navigation" id="navigation">
      <button id="nav-toggle-btn" class="nav-toggle-btn">
         <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="nav-content-wrapper">

        <div class="navbar-top">
          <ul>
            <li><a href="#" class="nav-link" data-page="page_a.html" id="page1">Page 1</a></li>
            <li><a href="page_blank.html" id="page_blank">Blank Page</a></li>
          </ul>
        </div>

        <div class="navbar-center">
          <ul>
            <li><a href="#" class="nav-link" data-page="page_b.html" id="page2">Page 2</a></li>
            <li><a href="#" class="nav-link" data-page="page_c.html" id="page3">Page 3</a></li>
            <li><a href="#" class="nav-link" data-page="page_d.html" id="page4">Page 4</a></li>
          </ul>
        </div>

        <div class="navbar-bottom">
          <ul>
            <li><a href="#" id="download-cards-btn">Download</a></li>
            <li><a href="#" id="upload-cards-trigger">Upload</a></li>
            <li><div class="setting" id="open-settings-btn"></div></li>
          </ul>
          <input type="file" id="upload-cards-input" style="display:none" accept=".json">
        </div>

      </div>
    </nav>
  </div>

  <!-- Main content -->
  <div id="main-content-area">
    <div class="card-container">
      <div id="card-wrapper">
        <a id="add-new-card" class="card add-new-card"></a>
      </div>
    </div>
  </div>

  <!-- URL Add Component -->
  <div id="url-modal" class="url-input-container url-input-hidden">
    <div class="input-wrapper">
      <input id="modal-url-input" placeholder="Enter your URL" class="input" name="text" type="text" />
      <button id="modal-add-btn" class="Subscribe-btn">Add</button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="settings-panel settings-panel-hidden">
    <div class="settings-inner">

      <div class="settings-header">
        <span class="settings-title">⚙ Cài Đặt</span>
        <div style="display: flex; align-items: center; gap: 10px;">
          <!-- Delete All Icons Button -->
          <button aria-label="Delete all icons" class="delete-button" id="delete-all-icons-btn">
            <svg class="trash-svg" viewBox="0 -10 64 74" xmlns="http://www.w3.org/2000/svg">
              <g id="trash-can">
                <rect x="16" y="24" width="32" height="30" rx="3" ry="3" fill="#e74c3c"></rect>
                <g transform-origin="12 18" id="lid-group">
                  <rect x="12" y="12" width="40" height="6" rx="2" ry="2" fill="#c0392b"></rect>
                  <rect x="26" y="8" width="12" height="4" rx="2" ry="2" fill="#c0392b"></rect>
                </g>
              </g>
            </svg>
          </button>
          <button id="close-settings-btn" class="settings-close-btn" style="background: transparent; border: none; font-size: 24px; color: white; cursor: pointer; padding: 0; transition: 0.2s;">✕</button>
        </div>
      </div>

      <!-- Background -->
      <div class="settings-section">
        <div class="settings-section-title" style="display: flex; align-items: center; justify-content: space-between;">
            <span>🎨 Tùy Chỉnh Nền</span>
            <div style="display: flex; gap: 5px;">
                <button class="settings-btn" id="bg-mode-video-btn" style="background-color: #333; color: #fff;">Video/GIF</button>
                <button class="settings-btn" id="bg-mode-color-btn">Màu Gradient</button>
            </div>
        </div>
        
        <div id="bg-video-controls" class="bg-settings-container" style="display: flex; align-items: flex-start; gap: 30px;">
          <!-- Background Preview -->
          <div id="bg-preview-container" class="bg-preview-container" style="flex-shrink: 0; margin: 0;">
            <div id="bg-preview-overlay" class="bg-preview-overlay"></div>
            <video id="bg-preview-video" loop muted autoplay playsinline>
              <source src="bg.mp4" type="video/mp4">
            </video>
            <div id="bg-preview-gif" class="bg-preview-gif"></div>
          </div>

          <div class="bg-controls" style="flex: 1;">
            <div class="settings-row">
              <label>Upload Video / GIF mới</label>
              <button class="settings-btn" id="bg-upload-btn">Chọn File</button>
              <input type="file" id="bg-upload-input" accept="video/*,image/gif" style="display:none">
            </div>
            <div class="settings-row">
              <label>Độ sáng: <span id="bg-brightness-val">25</span>%</label>
              <input type="range" id="bg-brightness-slider" min="0" max="100" value="25" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Tốc độ: <span id="bg-speed-val">0.5</span>x</label>
              <input type="range" id="bg-speed-slider" min="0.1" max="4" step="0.1" value="0.5" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Xóa cài đặt nền</label>
              <button class="settings-btn" id="bg-reset-btn">Đặt lại</button>
            </div>
          </div>
        </div>

        <div id="bg-color-controls" class="bg-settings-container" style="display: none; align-items: flex-start; gap: 30px; margin-top: 15px;">
          <div id="bg-color-preview" class="bg-preview-container" style="flex-shrink: 0; margin: 0; background: linear-gradient(45deg, #1a1a1a, #333333); border-radius: 8px;">
          </div>
          <div class="bg-controls" style="flex: 1;">
            <div id="dynamic-color-list" style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px;">
                <!-- dynamic rows go here -->
            </div>
            <button class="settings-btn" id="bg-color-add-btn" style="width: 100%; margin-bottom: 15px; justify-content: center;">➕ Thêm màu mới</button>
            <div class="settings-row">
              <label>Góc độ: <span id="bg-color-angle-val">45</span>°</label>
              <input type="range" id="bg-color-angle" min="0" max="360" value="45" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Khôi phục mặc định</label>
              <button class="settings-btn" id="bg-color-reset-btn">Đặt lại</button>
            </div>
          </div>
        </div>
        
        <div class="settings-row" style="align-items: center; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px;">
          <label>🎮 Hiệu ứng Retro</label>
          <input type="checkbox" id="crt-mode-checkbox" class="settings-checkbox" style="width: 20px; height: 20px;">
        </div>
        <div id="retro-sliders" style="display: none; flex-direction: column; gap: 10px; margin-top: 10px;">
            <div class="settings-row">
              <label>Nhiễu hạt (Noise): <span id="noise-level-val">15</span>%</label>
              <input type="range" id="noise-level-slider" min="0" max="100" value="15" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Cấp độ Dither: <span id="dither-level-val">20</span>%</label>
              <input type="range" id="dither-level-slider" min="0" max="100" value="20" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Sọc ngang VHS: <span id="vhs-level-val">100</span>%</label>
              <input type="range" id="vhs-level-slider" min="0" max="100" value="100" class="settings-slider">
            </div>
        </div>

      </div>

      <!-- Card Icons -->
      <div class="settings-section">
        <div class="settings-section-title">🖼 Icon Card (Random Pool)</div>
        <div class="settings-row">
          <label>Upload icon cho card mới</label>
          <div style="display: flex; gap: 5px;">
            <button class="settings-btn" id="toggle-all-random-btn">Chọn Tất Cả</button>
            <button class="settings-btn" id="card-icon-upload-btn">Chọn File</button>
          </div>
          <input type="file" id="card-icon-upload-input" accept="image/*" multiple style="display:none">
        </div>
        <div class="settings-icons-grid" id="card-icons-grid"></div>
      </div>

      <!-- Main Card Icon -->
      <div class="settings-section">
        <div class="settings-section-title">⭐ Icon Card Chính</div>
        <div class="settings-row">
          <label>Upload icon cho card chính</label>
          <div style="display: flex; gap: 5px;">
            <button class="settings-btn" id="toggle-all-main-btn">Chọn Tất Cả</button>
            <button class="settings-btn" id="main-card-icon-upload-btn">Chọn File</button>
          </div>
          <input type="file" id="main-card-icon-upload-input" accept="image/*" multiple style="display:none">
        </div>
        <div class="settings-icons-grid" id="main-card-icons-grid"></div>
      </div>

      <!-- Storage Info -->
      <div class="settings-section">
        <div class="settings-section-title">💾 Bộ nhớ hệ thống</div>
        <div class="settings-row">
          <label>Dung lượng còn lại</label>
          <span id="storage-info" style="font-size: 0.9em; color: #aaa;">Đang tính...</span>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">🔊 Hiệu ứng âm thanh (SFX)</div>
        <div class="settings-row">
          <label>Âm lượng: <span id="sfx-volume-val">50</span>%</label>
          <input type="range" id="sfx-volume-slider" min="0" max="100" value="50" class="settings-slider">
        </div>
      </div>

      <!-- Clock Settings -->
      <div class="settings-section">
        <div class="settings-section-title">🕒 Đồng Hồ</div>
        
        <div class="settings-row">
          <label>Cỡ chữ: <span id="clock-size-val">48</span>px</label>
          <input type="range" id="clock-size-slider" min="20" max="150" value="48" class="settings-slider">
        </div>

        <div class="settings-row">
          <label>Màu chữ</label>
          <input type="color" id="clock-color-picker" value="#ffffff" style="cursor: pointer; width: 40px; height: 40px; border: none; padding: 0; border-radius: 5px; background: transparent;">
        </div>
        
        <div class="settings-row">
          <label>Phông chữ</label>
          <select id="clock-font-select" class="settings-slider" style="background: #2a2a2a; border: 1px solid #444; color: white; padding: 5px; border-radius: 5px;">
            <option value="'Courier New', Courier, monospace">Monospace</option>
            <option value="Arial, sans-serif">Arial</option>
            <option value="'Times New Roman', Times, serif">Times New Roman</option>
            <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
            <option value="Impact, fantasy">Impact</option>
          </select>
        </div>

        <div class="settings-row" style="align-items: center;">
          <label>Định dạng AM / PM</label>
          <input type="checkbox" id="clock-ampm-checkbox" style="width: 18px; height: 18px; cursor: pointer;">
        </div>

        <div class="settings-row" style="align-items: center;">
          <label>Hiển thị dấu chấm ( . )</label>
          <input type="checkbox" id="clock-dot-checkbox" style="width: 18px; height: 18px; cursor: pointer;">
        </div>

        <div class="settings-row" style="align-items: center;">
          <label>Icon Sáng / Tối (☀️/🌙)</label>
          <input type="checkbox" id="clock-icon-checkbox" style="width: 18px; height: 18px; cursor: pointer;">
        </div>
        
        <div class="settings-row">
          <label>Khôi phục vị trí mặc định</label>
          <button class="settings-btn" id="clock-reset-btn">Đặt lại</button>
        </div>

        <div class="settings-row" style="border-top: 1px solid #444; padding-top: 15px; margin-top: 10px;">
          <label>Dung lượng còn lại</label>
          <div class="progress-loader">
            <div id="storage-progress" class="progress"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="notification-container" class="notification-container"></div>
  
  <!-- Firebase SDKs -->
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script src="firebase-config.js?v=7"></script>
  <script src="mainscript.js?v=3"></script>
</body>
</html>
