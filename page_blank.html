<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arto</title>
  <link rel="stylesheet" href="page_blank.css?v=2" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22white%22>Ω</text></svg>"
    type="image/svg+xml">
</head>
<body>
  <!-- Retro Filter Overlay -->
  <div id="crt-overlay" style="display: none; pointer-events: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9990;">
    <div class="crt-scanlines"></div>
    <div class="dither-overlay" id="dither-overlay"></div>
    <div class="crt-noise" id="crt-noise"></div>
  </div>

  <!-- User Account (Top Right) -->
  <div id="user-auth-section" class="user-auth-section top-right">
    <button id="login-btn" class="login-btn guest" title="Login / Guest Mode">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </button>
    <div id="user-info" class="user-info hidden">
      <img id="user-photo" src="" alt="user">
      <div id="logout-panel" class="logout-panel">
        <button id="logout-btn" class="logout-btn" title="Logout">✕</button>
      </div>
    </div>
  </div>

  <!-- Fade-in overlay -->
  <div id="page-fade-overlay"></div>

  <div class="backgroundhover"></div>
  <div id="dot-background" class="dot-background"></div>

  <video id="backgroundVideo" loop muted autoplay playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>

  <div id="imageOverlay" class="image-overlay"></div>

  <!-- Mindmap Canvas Container -->
  <div id="mindmap-canvas" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 1;">
      <div id="mindmap-workspace" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform-origin: 0 0;">
          <!-- Elements will be created here -->
      </div>
  </div>

  <!-- Navigation -->
  <div class="content">
    <nav class="navigation" id="navigation">
      <button id="nav-toggle-btn" class="nav-toggle-btn">
         <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="nav-content-wrapper">

        <div class="navbar-top">
          <ul>
            <li><a href="#" class="nav-link" data-page="page_a.html" id="page1">Page 1</a></li>
            <li><a href="page_blank.html" id="page_blank">Blank Page</a></li>
          </ul>
        </div>

        <div class="navbar-center">
          <ul>
            <li><a href="#" class="nav-link" data-page="page_b.html" id="page2">Page 2</a></li>
            <li><a href="#" class="nav-link" data-page="page_c.html" id="page3">Page 3</a></li>
            <li><a href="#" class="nav-link" data-page="page_d.html" id="page4">Page 4</a></li>
          </ul>
        </div>

        <div class="navbar-bottom">
          <ul>
            <li><a href="#" id="download-cards-btn">Download</a></li>
            <li><a href="#" id="upload-cards-trigger">Upload</a></li>
            <li><div class="setting" id="open-settings-btn"></div></li>
          </ul>
          <input type="file" id="upload-cards-input" style="display:none" accept=".json">
        </div>

      </div>
    </nav>
  </div>



  <!-- Settings Panel -->
  <div id="settings-panel" class="settings-panel settings-panel-hidden">
    <div class="settings-inner">

      <div class="settings-header">
        <span class="settings-title">⚙ Cài Đặt</span>
        <div style="display: flex; align-items: center; gap: 10px;">
          <!-- Delete All Icons Button -->
          <button aria-label="Delete all icons" class="delete-button" id="delete-all-icons-btn">
            <svg class="trash-svg" viewBox="0 -10 64 74" xmlns="http://www.w3.org/2000/svg">
              <g id="trash-can">
                <rect x="16" y="24" width="32" height="30" rx="3" ry="3" fill="#e74c3c"></rect>
                <g transform-origin="12 18" id="lid-group">
                  <rect x="12" y="12" width="40" height="6" rx="2" ry="2" fill="#c0392b"></rect>
                  <rect x="26" y="8" width="12" height="4" rx="2" ry="2" fill="#c0392b"></rect>
                </g>
              </g>
            </svg>
          </button>
          <button id="close-settings-btn" class="settings-close-btn" style="background: transparent; border: none; font-size: 24px; color: white; cursor: pointer; padding: 0; transition: 0.2s;">✕</button>
        </div>
      </div>

      <!-- Background -->
      <div class="settings-section">
        <div class="settings-section-title" style="display: flex; align-items: center; justify-content: space-between;">
            <span>🎨 Tùy Chỉnh Nền</span>
            <div style="display: flex; gap: 5px;">
                <button class="settings-btn" id="bg-mode-video-btn" style="background-color: #333; color: #fff;">Video/GIF</button>
                <button class="settings-btn" id="bg-mode-color-btn">Màu Gradient</button>
                <button class="settings-btn" id="bg-mode-dot-btn">Lưới Chấm</button>
            </div>
        </div>
        
        <div id="bg-video-controls" class="bg-settings-container" style="display: flex; align-items: flex-start; gap: 30px;">
          <!-- Background Preview -->
          <div id="bg-preview-container" class="bg-preview-container" style="flex-shrink: 0; margin: 0;">
            <div id="bg-preview-overlay" class="bg-preview-overlay"></div>
            <video id="bg-preview-video" loop muted autoplay playsinline>
              <source src="bg.mp4" type="video/mp4">
            </video>
            <div id="bg-preview-gif" class="bg-preview-gif"></div>
          </div>

          <div class="bg-controls" style="flex: 1;">
            <div class="settings-row">
              <label>Upload Video / GIF mới</label>
              <button class="settings-btn" id="bg-upload-btn">Chọn File</button>
              <input type="file" id="bg-upload-input" accept="video/*,image/gif" style="display:none">
            </div>
            <div class="settings-row">
              <label>Độ sáng: <span id="bg-brightness-val">25</span>%</label>
              <input type="range" id="bg-brightness-slider" min="0" max="100" value="25" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Tốc độ: <span id="bg-speed-val">0.5</span>x</label>
              <input type="range" id="bg-speed-slider" min="0.1" max="4" step="0.1" value="0.5" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Xóa cài đặt nền</label>
              <button class="settings-btn" id="bg-reset-btn">Đặt lại</button>
            </div>
          </div>
        </div>

        <div id="bg-color-controls" class="bg-settings-container" style="display: none; align-items: flex-start; gap: 30px; margin-top: 15px;">
          <div id="bg-color-preview" class="bg-preview-container" style="flex-shrink: 0; margin: 0; background: linear-gradient(45deg, #1a1a1a, #333333); border-radius: 8px;">
          </div>
          <div class="bg-controls" style="flex: 1;">
            <div id="dynamic-color-list" style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px;">
                <!-- dynamic rows go here -->
            </div>
            <button class="settings-btn" id="bg-color-add-btn" style="width: 100%; margin-bottom: 15px; justify-content: center;">➕ Thêm màu mới</button>
            <div class="settings-row">
              <label>Góc độ: <span id="bg-color-angle-val">45</span>°</label>
              <input type="range" id="bg-color-angle" min="0" max="360" value="45" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Khôi phục mặc định</label>
              <button class="settings-btn" id="bg-color-reset-btn">Đặt lại</button>
            </div>
          </div>
        </div>

        <div id="bg-dot-controls" class="bg-settings-container" style="display: none; align-items: flex-start; gap: 30px; margin-top: 15px;">
          <div id="bg-dot-preview" class="bg-preview-container" style="flex-shrink: 0; margin: 0; background-color: #313131; background-image: radial-gradient(rgba(255, 255, 255, 0.171) 2px, transparent 0); background-size: 30px 30px; background-position: -5px -5px;">
          </div>
          <div class="bg-controls" style="flex: 1;">
            <div class="settings-row">
              <label>Màu Nền</label>
              <input type="color" id="bg-dot-bg-color" value="#313131" style="cursor: pointer; width: 40px; height: 40px; border: none; padding: 0; border-radius: 5px; background: transparent;">
            </div>
            <div class="settings-row">
              <label>Màu Chấm</label>
              <input type="color" id="bg-dot-color" value="#ffffff" style="cursor: pointer; width: 40px; height: 40px; border: none; padding: 0; border-radius: 5px; background: transparent;">
            </div>
            <div class="settings-row">
              <label>Độ mờ chấm: <span id="bg-dot-opacity-val">17</span>%</label>
              <input type="range" id="bg-dot-opacity" min="0" max="100" value="17" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Cỡ lưới: <span id="bg-dot-size-val">30</span>px</label>
              <input type="range" id="bg-dot-size" min="10" max="100" value="30" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Khôi phục mặc định</label>
              <button class="settings-btn" id="bg-dot-reset-btn">Đặt lại</button>
            </div>
          </div>
        </div>
        
        <div class="settings-row" style="align-items: center; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px;">
          <label>🎮 Hiệu ứng Retro</label>
          <input type="checkbox" id="crt-mode-checkbox" class="settings-checkbox" style="width: 20px; height: 20px;">
        </div>
        <div id="retro-sliders" style="display: none; flex-direction: column; gap: 10px; margin-top: 10px;">
            <div class="settings-row">
              <label>Nhiễu hạt (Noise): <span id="noise-level-val">15</span>%</label>
              <input type="range" id="noise-level-slider" min="0" max="100" value="15" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Cấp độ Dither: <span id="dither-level-val">20</span>%</label>
              <input type="range" id="dither-level-slider" min="0" max="100" value="20" class="settings-slider">
            </div>
            <div class="settings-row">
              <label>Sọc ngang VHS: <span id="vhs-level-val">100</span>%</label>
              <input type="range" id="vhs-level-slider" min="0" max="100" value="100" class="settings-slider">
            </div>
        </div>

      </div>



      <!-- Storage Info -->
      <div class="settings-section">
        <div class="settings-section-title">💾 Bộ nhớ hệ thống</div>
        <div class="settings-row">
          <label>Dung lượng còn lại</label>
          <div class="progress-loader">
            <div id="storage-progress" class="progress"></div>
          </div>
        </div>
      </div>

      <!-- SFX Settings -->
      <div class="settings-section">
        <div class="settings-section-title">🔊 Hiệu ứng âm thanh (SFX)</div>
        <div class="settings-row">
          <label>Âm lượng: <span id="sfx-volume-val">50</span>%</label>
          <input type="range" id="sfx-volume-slider" min="0" max="100" value="50" class="settings-slider">
        </div>
      </div>



    </div>
  </div>


  <section class="figjam-toolbar">
    <div class="toolbar-group">
      <label class="toolbar-item">
        <span class="custom-tooltip">Select ( V )</span>
        <input type="radio" name="tool" value="select" checked>
        <div class="icon-wrapper select-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path></svg>
        </div>
      </label>
      <label class="toolbar-item">
        <span class="custom-tooltip">Hand ( H )</span>
        <input type="radio" name="tool" value="hand">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V5.5A1.5 1.5 0 0 1 11 5.5V11"></path><path d="M11 11V3.5A1.5 1.5 0 0 1 14 3.5V11"></path><path d="M14 11V4.5A1.5 1.5 0 0 1 17 4.5V11"></path><path d="M17 11V7.5A1.5 1.5 0 0 1 20 7.5V15a8 8 0 0 1-16 0V11a1.5 1.5 0 0 1 3 0v2"></path></svg>
        </div>
      </label>
    </div>
    
    <div class="toolbar-divider"></div>
    
    <div class="toolbar-group">
      <label class="toolbar-item">
        <span class="custom-tooltip">Marker ( M )</span>
        <input type="radio" name="tool" value="marker">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
        </div>
        
        <!-- Marker Settings Toolbar -->
        <div id="marker-settings-toolbar" class="marker-settings-toolbar">
          <div class="settings-group">
            <label class="setting-item">
              <input type="radio" name="marker_type" value="pen" checked>
              <div class="setting-icon pen-icon" title="Pen">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
              </div>
            </label>
            <label class="setting-item">
              <input type="radio" name="marker_type" value="marker">
              <div class="setting-icon marker-icon" title="Marker">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
              </div>
            </label>
            <label class="setting-item">
              <input type="radio" name="marker_type" value="highlighter">
              <div class="setting-icon highlighter-icon" title="Highlighter">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path></svg>
              </div>
            </label>
            <label class="setting-item">
              <input type="radio" name="marker_type" value="eraser">
              <div class="setting-icon eraser-icon" title="Eraser">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L10 7L14 11L7 18H20V20Z"></path><path d="M19 15L14 10L17 7C17.5 6.5 18.5 6.5 19 7L22 10C22.5 10.5 22.5 11.5 22 12L19 15Z"></path></svg>
              </div>
            </label>
          </div>
          
          <div class="toolbar-divider mini"></div>
          
          <div class="settings-group colors">
            <label class="color-item">
              <input type="radio" name="marker_color" value="#000000" checked>
              <div class="color-circle" style="background-color: #000;"></div>
            </label>
            <label class="color-item">
              <input type="radio" name="marker_color" value="#ff4d4d">
              <div class="color-circle" style="background-color: #ff4d4d;"></div>
            </label>
            <label class="color-item">
              <input type="radio" name="marker_color" value="#0d99ff">
              <div class="color-circle" style="background-color: #0d99ff;"></div>
            </label>
            <label class="color-item">
              <input type="radio" name="marker_color" value="#2ecc71">
              <div class="color-circle" style="background-color: #2ecc71;"></div>
            </label>
            <label class="color-item">
              <input type="radio" name="marker_color" value="#f1c40f">
              <div class="color-circle" style="background-color: #f1c40f;"></div>
            </label>
          </div>
          
          <div class="toolbar-divider mini"></div>
          
          <div class="settings-group sizes">
            <label class="size-item">
              <input type="radio" name="marker_size" value="2" checked>
              <div class="size-circle thin"></div>
            </label>
            <label class="size-item">
              <input type="radio" name="marker_size" value="6">
              <div class="size-circle medium"></div>
            </label>
            <label class="size-item">
              <input type="radio" name="marker_size" value="12">
              <div class="size-circle thick"></div>
            </label>
          </div>
        </div>
      </label>
      <div class="toolbar-item" style="position: relative;">
        <div id="note-color-toolbar" class="note-color-toolbar">
          <label class="color-item">
            <input type="radio" name="note_color" value="#FFF9B1" checked>
            <div class="color-circle" style="background-color: #FFF9B1;"></div>
          </label>
          <label class="color-item">
            <input type="radio" name="note_color" value="#FFD8B1">
            <div class="color-circle" style="background-color: #FFD8B1;"></div>
          </label>
          <label class="color-item">
            <input type="radio" name="note_color" value="#B5EAD7">
            <div class="color-circle" style="background-color: #B5EAD7;"></div>
          </label>
          <label class="color-item">
            <input type="radio" name="note_color" value="#C7CEEA">
            <div class="color-circle" style="background-color: #C7CEEA;"></div>
          </label>
          <label class="color-item">
            <input type="radio" name="note_color" value="#FFDAC1">
            <div class="color-circle" style="background-color: #FFDAC1;"></div>
          </label>
          <label class="color-item">
            <input type="radio" name="note_color" value="random">
            <div class="color-circle" style="background: conic-gradient(from 0deg, #FFF9B1, #FFD8B1, #B5EAD7, #C7CEEA, #FFDAC1, #FFF9B1);"></div>
          </label>
        </div>
        <span class="custom-tooltip">Sticky Note ( S )</span>
        <label style="cursor: pointer; display: flex; width: 100%; height: 100%;">
          <input type="radio" name="tool" value="sticky">
          <div class="icon-wrapper sticky-icon" style="margin: auto;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15.5 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"></path>
              <path d="M15 3v6h6"></path>
            </svg>
          </div>
        </label>
      </div>
      <label class="toolbar-item">
        <span class="custom-tooltip">Shapes ( R )</span>
        <input type="radio" name="tool" value="shape">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
        </div>
      </label>
      <label class="toolbar-item">
        <span class="custom-tooltip">Connector ( L )</span>
        <input type="radio" name="tool" value="connector">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
        </div>
      </label>
    </div>
    
    <div class="toolbar-divider"></div>
    
    <div class="toolbar-group">
      <label class="toolbar-item">
        <span class="custom-tooltip">Text ( T )</span>
        <input type="radio" name="tool" value="text">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"></path><path d="M12 4v16"></path><path d="M8 20h8"></path></svg>
        </div>
      </label>
      <label class="toolbar-item">
        <span class="custom-tooltip">Section ( A )</span>
        <input type="radio" name="tool" value="section">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"></rect><path d="M4 10h16"></path></svg>
        </div>
      </label>
      <label class="toolbar-item">
        <span class="custom-tooltip">Table ( B )</span>
        <input type="radio" name="tool" value="table">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M3 9h18"></path><path d="M3 15h18"></path><path d="M9 3v18"></path><path d="M15 3v18"></path></svg>
        </div>
      </label>
      <label class="toolbar-item">
        <span class="custom-tooltip">Stamp ( E )</span>
        <input type="radio" name="tool" value="stamp">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14"></path><path d="M19 22V11a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v11"></path><path d="M12 9V2"></path><path d="M9 2h6"></path></svg>
        </div>
      </label>
      <label class="toolbar-item">
        <span class="custom-tooltip">Comment ( C )</span>
        <input type="radio" name="tool" value="comment">
        <div class="icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </div>
      </label>
      <label class="toolbar-item">
        <span class="custom-tooltip">Widgets ( W )</span>
        <input type="radio" name="tool" value="widgets">
        <div class="icon-wrapper">
